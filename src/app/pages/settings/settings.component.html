<app-header title="Settings" [showBack]="true" (onBack)="goBack()"></app-header>

<div class="page">
  <div class="section" *ngIf="appUser">
    <h2>Account</h2>
    <div class="info-row">
      <span class="info-label">Name</span>
      <span class="info-value">{{ appUser.displayName || '—' }}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Email</span>
      <span class="info-value">{{ appUser.email }}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Role</span>
      <span class="info-value role-badge">{{ appUser.role }}</span>
    </div>
  </div>

  <div class="section">
    <h2>API Backend</h2>
    <p class="section-desc">Choose which backend API to connect to.</p>
    <div class="backend-options">
      <button
        *ngFor="let choice of [BackendChoice.JS, BackendChoice.DOTNET]"
        class="backend-option"
        [class.active]="selectedBackend === choice"
        (click)="switchBackend(choice)"
      >
        <span class="option-label">{{ BACKEND_CONFIG[choice].label }}</span>
        <span class="option-url">{{ BACKEND_CONFIG[choice].baseUrl }}</span>
      </button>
    </div>
  </div>

  <div class="section">
    <button class="btn-danger" (click)="signOut()">Sign Out</button>
  </div>
</div>
