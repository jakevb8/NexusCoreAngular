<app-header title="Settings" [showBack]="true" (onBack)="goBack()"></app-header>

<div class="page">
  <div class="section" *ngIf="appUser">
    <h2>Account</h2>
    <div class="info-row">
      <span class="info-label">Name</span>
      <span class="info-value">{{ appUser.displayName || '—' }}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Email</span>
      <span class="info-value">{{ appUser.email }}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Role</span>
      <span class="info-value role-badge">{{ appUser.role }}</span>
    </div>
  </div>

  <div class="section">
    <button class="btn-danger" (click)="signOut()">Sign Out</button>
  </div>
</div>
