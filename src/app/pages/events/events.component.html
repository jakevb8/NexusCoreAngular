<app-header title="Events" [showBack]="true" (onBack)="goBack()"></app-header>

<div class="page">
  <div *ngIf="error" class="alert-error">{{ error }}</div>
  <div *ngIf="loading" class="loading">Loading...</div>

  <div class="table-wrap" *ngIf="!loading">
    <table class="data-table">
      <thead>
        <tr>
          <th>Asset</th>
          <th>Previous Status</th>
          <th>New Status</th>
          <th>Occurred At</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let event of events">
          <td>{{ event.assetName || event.assetId || '—' }}</td>
          <td>
            <app-status-chip *ngIf="event.previousStatus" [status]="event.previousStatus"></app-status-chip>
            <span *ngIf="!event.previousStatus">—</span>
          </td>
          <td>
            <app-status-chip *ngIf="event.newStatus" [status]="event.newStatus"></app-status-chip>
            <span *ngIf="!event.newStatus">—</span>
          </td>
          <td class="timestamp">{{ formatDate(event.occurredAt) }}</td>
        </tr>
        <tr *ngIf="events.length === 0">
          <td colspan="4" class="empty">No events found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" *ngIf="totalPages > 1">
    <button class="btn-ghost btn-sm" (click)="prevPage()" [disabled]="page <= 1">Prev</button>
    <span>{{ page }} / {{ totalPages }}</span>
    <button class="btn-ghost btn-sm" (click)="nextPage()" [disabled]="page >= totalPages">Next</button>
  </div>
</div>
